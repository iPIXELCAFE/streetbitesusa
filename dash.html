<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Dashboard — Street Bites USA</title>
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--orange:#F97316;--orange-dark:#EA580C;--orange-light:#FED7AA;--cream:#FFFBF5;--charcoal:#1C1917;--gray:#78716C;--gray-light:#F5F5F4;--gray-mid:#E7E5E4;--green:#16A34A;--shadow-sm:0 1px 3px rgba(0,0,0,.08);--shadow-md:0 4px 16px rgba(0,0,0,.1);--radius:14px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--cream);color:var(--charcoal);min-height:100vh}
nav{background:#fff;border-bottom:1px solid var(--gray-mid);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--charcoal)}
.logo-icon{width:36px;height:36px;background:var(--orange);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
.logo span{font-weight:800;font-size:20px;letter-spacing:-.5px}
.logo em{color:var(--orange);font-style:normal}
.nav-right{display:flex;align-items:center;gap:12px}
.user-name{font-size:14px;font-weight:600;color:var(--gray)}
.logout-btn{padding:8px 16px;border-radius:8px;border:1.5px solid var(--gray-mid);background:#fff;font-size:14px;cursor:pointer;transition:all .15s;color:var(--charcoal)}
.logout-btn:hover{background:var(--gray-light)}
.main{max-width:900px;margin:0 auto;padding:40px 20px}
.status-bar{border-radius:14px;padding:20px 24px;margin-bottom:32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.status-bar.active{background:#DCFCE7;border:1.5px solid #86EFAC}
.status-bar.pending{background:#FEF9C3;border:1.5px solid #FDE047}
.status-bar.inactive{background:#FEE2E2;border:1.5px solid #FCA5A5}
.status-text{font-size:15px;font-weight:600}
.status-bar.active .status-text{color:#15803D}
.status-bar.pending .status-text{color:#854D0E}
.status-bar.inactive .status-text{color:#DC2626}
.activate-btn{padding:10px 20px;border-radius:9px;background:var(--orange);color:#fff;font-size:14px;font-weight:700;border:none;cursor:pointer;transition:all .15s;text-decoration:none}
.activate-btn:hover{background:var(--orange-dark)}
.section-title{font-size:20px;font-weight:800;letter-spacing:-.5px;margin-bottom:16px}
.card{background:#fff;border-radius:var(--radius);padding:28px;box-shadow:var(--shadow-sm);margin-bottom:20px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.card-title{font-size:17px;font-weight:800}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--charcoal)}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:11px 14px;border-radius:9px;border:1.5px solid var(--gray-mid);font-size:14px;outline:none;transition:border-color .15s;font-family:inherit;background:#fff}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--orange)}
.form-group textarea{resize:vertical;min-height:80px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.save-btn{padding:12px 28px;border-radius:10px;background:var(--orange);color:#fff;font-size:15px;font-weight:700;border:none;cursor:pointer;transition:all .15s}
.save-btn:hover{background:var(--orange-dark)}
.save-btn:disabled{background:var(--gray-mid);color:var(--gray);cursor:not-allowed}
.menu-item-row{display:grid;grid-template-columns:1fr 1fr auto;gap:10px;align-items:start;margin-bottom:12px;background:var(--gray-light);border-radius:10px;padding:12px}
.remove-btn{width:32px;height:32px;border-radius:8px;border:none;background:var(--gray-mid);color:var(--gray);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;align-self:center;flex-shrink:0;transition:all .15s;margin-top:22px}
.remove-btn:hover{background:#FEE2E2;color:#DC2626}
.add-item-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:10px 16px;border-radius:9px;border:1.5px dashed var(--gray-mid);background:none;color:var(--gray);font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;width:100%;margin-top:4px}
.add-item-btn:hover{border-color:var(--orange);color:var(--orange)}
.emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:8px}
.emoji-opt{width:44px;height:44px;border-radius:10px;border:2px solid var(--gray-mid);background:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.emoji-opt:hover{border-color:var(--orange)}
.emoji-opt.selected{border-color:var(--orange);background:rgba(249,115,22,.1)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--charcoal);color:#fff;padding:12px 24px;border-radius:100px;font-size:14px;font-weight:600;box-shadow:0 20px 48px rgba(0,0,0,.2);z-index:500;transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.loading{text-align:center;padding:80px;color:var(--gray)}
.view-listing-btn{padding:10px 20px;border-radius:9px;border:1.5px solid var(--gray-mid);background:#fff;font-size:14px;font-weight:600;cursor:pointer;text-decoration:none;color:var(--charcoal);transition:all .15s}
.view-listing-btn:hover{border-color:var(--orange);color:var(--orange)}
@media(max-width:600px){.form-row{grid-template-columns:1fr}.emoji-grid{grid-template-columns:repeat(6,1fr)}.menu-item-row{grid-template-columns:1fr}.remove-btn{margin-top:0}.nav-right .user-name{display:none}}
</style>
</head>
<body>

<nav>
  <a class="logo" href="index.html">
    <div class="logo-icon">🚚</div>
    <span>Street Bites<em>USA</em></span>
  </a>
  <div class="nav-right">
    <span class="user-name" id="userName"></span>
    <a class="view-listing-btn" href="index.html" target="_blank">👁 View Live Site</a>
    <button class="logout-btn" onclick="logout()">Log Out</button>
  </div>
</nav>

<div class="main">
  <div id="loading" class="loading">Loading your dashboard... 🚚</div>
  <div id="dashContent" style="display:none">

    <!-- Status Bar -->
    <div class="status-bar" id="statusBar">
      <div>
        <div class="status-text" id="statusText"></div>
        <div style="font-size:13px;color:var(--gray);margin-top:2px" id="statusSub"></div>
      </div>
      <div id="statusAction"></div>
    </div>

    <!-- Truck Profile -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">🚚 Truck Profile</div>
        <button class="save-btn" onclick="saveTruckInfo()" id="saveInfoBtn">Save Changes</button>
      </div>
      <div class="form-group">
        <label>Truck Name</label>
        <input type="text" id="truckName" />
      </div>
      <div class="form-group">
        <label>Icon</label>
        <div class="emoji-grid" id="emojiGrid"></div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Cuisine Type</label>
          <select id="cuisine">
            <option value="">Select...</option>
            <option>Mexican</option><option>BBQ</option><option>Burgers</option>
            <option>Asian</option><option>Seafood</option><option>Pizza</option>
            <option>Dessert</option><option>Vegan</option><option>Breakfast</option>
            <option>Mediterranean</option><option>Indian</option><option>American</option><option>Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Price Range</label>
          <select id="priceRange">
            <option value="$">$ — Budget-friendly</option>
            <option value="$$">$$ — Moderate</option>
            <option value="$$$">$$$ — Splurge</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>City</label>
          <input type="text" id="city" />
        </div>
        <div class="form-group">
          <label>State</label>
          <input type="text" id="state" maxlength="2" style="text-transform:uppercase"/>
        </div>
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="description"></textarea>
      </div>
      <div class="form-group">
        <label>Hours</label>
        <input type="text" id="hours" placeholder="e.g. Mon–Fri 11am–8pm" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Phone</label>
          <input type="tel" id="phone" placeholder="(512) 555-0100" />
        </div>
        <div class="form-group">
          <label>Instagram</label>
          <input type="text" id="instagram" placeholder="@yourtruck" />
        </div>
      </div>
      <div class="form-group">
        <label>Website</label>
        <input type="url" id="website" placeholder="https://" />
      </div>
    </div>

    <!-- Menu Items -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">🍽️ Menu Items</div>
        <button class="save-btn" onclick="saveMenu()" id="saveMenuBtn">Save Menu</button>
      </div>
      <div id="menuContainer"></div>
      <button class="add-item-btn" onclick="addMenuRow()">+ Add Item</button>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const sbClient = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
const EMOJIS = ['🌮','🔥','🍔','🍜','🦞','🍕','🍦','🌱','🥞','🍛','🐟','🌶️','🥩','🥑','🧇','🍳','🌊','🏆','⭐','🚚','🍱','🥐','🍥','🎸'];

let currentTruck = null;
let selectedEmoji = '🚚';
let menuItems = [];

async function init() {
  const { data: { user } } = await sbClient.auth.getUser();
  if (!user) { window.location = 'login.html'; return; }

  document.getElementById('userName').textContent = user.user_metadata?.full_name || user.email;

  const { data: truck } = await sbClient
    .from('trucks')
    .select('*, menu_items(*)')
    .eq('owner_id', user.id)
    .single();

  document.getElementById('loading').style.display = 'none';
  document.getElementById('dashContent').style.display = 'block';

  if (truck) {
    currentTruck = truck;
    populateForm(truck);
    renderStatusBar(truck.status);
    menuItems = truck.menu_items || [];
    renderMenuItems();
  } else {
    renderStatusBar('no_truck');
  }

  buildEmojiGrid();
}

function buildEmojiGrid() {
  const grid = document.getElementById('emojiGrid');
  grid.innerHTML = '';
  EMOJIS.forEach(e => {
    const btn = document.createElement('button');
    btn.className = 'emoji-opt' + (e === selectedEmoji ? ' selected' : '');
    btn.textContent = e;
    btn.type = 'button';
    btn.onclick = () => {
      document.querySelectorAll('.emoji-opt').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedEmoji = e;
    };
    grid.appendChild(btn);
  });
}

function populateForm(t) {
  document.getElementById('truckName').value = t.name || '';
  document.getElementById('cuisine').value = t.cuisine || '';
  document.getElementById('priceRange').value = t.price_range || '$';
  document.getElementById('city').value = t.city || '';
  document.getElementById('state').value = t.state || '';
  document.getElementById('description').value = t.description || '';
  document.getElementById('hours').value = t.hours || '';
  document.getElementById('phone').value = t.phone || '';
  document.getElementById('instagram').value = t.instagram ? '@' + t.instagram : '';
  document.getElementById('website').value = t.website || '';
  selectedEmoji = t.emoji || '🚚';
}

function renderStatusBar(status) {
  const bar = document.getElementById('statusBar');
  const text = document.getElementById('statusText');
  const sub = document.getElementById('statusSub');
  const action = document.getElementById('statusAction');

  bar.className = 'status-bar ' + (status === 'active' ? 'active' : status === 'pending' ? 'pending' : 'inactive');

  if (status === 'active') {
    text.textContent = '✅ Your listing is LIVE!';
    sub.textContent = 'Customers can find you on Street Bites USA right now.';
    action.innerHTML = '<a href="index.html" target="_blank" class="activate-btn">View Live Listing →</a>';
  } else if (status === 'pending') {
    text.textContent = '⏳ Payment Pending';
    sub.textContent = 'Complete payment to activate your listing.';
    action.innerHTML = `<a href="${CONFIG.STRIPE_PAYMENT_LINK}" target="_blank" class="activate-btn">Complete Payment →</a>`;
  } else if (status === 'no_truck') {
    text.textContent = '🚚 No listing found';
    sub.textContent = 'Create your food truck profile below.';
    action.innerHTML = '<a href="signup.html" class="activate-btn">Create Listing →</a>';
  } else {
    text.textContent = '❌ Listing Inactive';
    sub.textContent = 'Renew your subscription to go live again.';
    action.innerHTML = `<a href="${CONFIG.STRIPE_PAYMENT_LINK}" target="_blank" class="activate-btn">Reactivate →</a>`;
  }
}

async function saveTruckInfo() {
  if (!currentTruck) return;
  const btn = document.getElementById('saveInfoBtn');
  btn.disabled = true; btn.textContent = 'Saving...';

  const { error } = await sbClient.from('trucks').update({
    name: document.getElementById('truckName').value.trim(),
    emoji: selectedEmoji,
    cuisine: document.getElementById('cuisine').value,
    price_range: document.getElementById('priceRange').value,
    city: document.getElementById('city').value.trim(),
    state: document.getElementById('state').value.trim().toUpperCase(),
    description: document.getElementById('description').value.trim(),
    hours: document.getElementById('hours').value.trim(),
    phone: document.getElementById('phone').value.trim(),
    instagram: document.getElementById('instagram').value.trim().replace('@',''),
    website: document.getElementById('website').value.trim(),
    updated_at: new Date().toISOString(),
  }).eq('id', currentTruck.id);

  btn.disabled = false; btn.textContent = 'Save Changes';
  if (error) showToast('❌ Error: ' + error.message);
  else showToast('✅ Truck profile saved!');
}

function renderMenuItems() {
  const container = document.getElementById('menuContainer');
  container.innerHTML = '';
  menuItems.forEach((item, i) => {
    const div = document.createElement('div');
    div.className = 'menu-item-row';
    div.innerHTML = `
      <div class="form-group" style="margin:0">
        <label>Item Name</label>
        <input type="text" value="${escHtml(item.name||'')}" onchange="menuItems[${i}].name=this.value" style="background:#fff"/>
      </div>
      <div class="form-group" style="margin:0">
        <label>Price</label>
        <input type="text" value="${escHtml(item.price||'')}" onchange="menuItems[${i}].price=this.value" style="background:#fff"/>
      </div>
      <button class="remove-btn" onclick="removeMenuItem(${i})">✕</button>
      <div class="form-group" style="margin:0;grid-column:1/-1">
        <label>Description</label>
        <input type="text" value="${escHtml(item.description||'')}" onchange="menuItems[${i}].description=this.value" style="background:#fff"/>
      </div>
    `;
    container.appendChild(div);
  });
}

function addMenuRow() {
  menuItems.push({ name: '', price: '', description: '' });
  renderMenuItems();
}

function removeMenuItem(i) {
  menuItems.splice(i, 1);
  renderMenuItems();
}

async function saveMenu() {
  if (!currentTruck) return;
  const btn = document.getElementById('saveMenuBtn');
  btn.disabled = true; btn.textContent = 'Saving...';

  // Delete all existing, re-insert
  await sbClient.from('menu_items').delete().eq('truck_id', currentTruck.id);
  const validItems = menuItems.filter(m => m.name.trim());
  if (validItems.length > 0) {
    await sbClient.from('menu_items').insert(validItems.map(m => ({ ...m, truck_id: currentTruck.id })));
  }

  btn.disabled = false; btn.textContent = 'Save Menu';
  showToast('✅ Menu saved!');
}

function escHtml(str) { return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

async function logout() {
  await sbClient.auth.signOut();
  window.location = 'login.html';
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

init();
</script>
</body>
</html>
