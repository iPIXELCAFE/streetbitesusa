<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You're Live! — Street Bites USA</title>
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--orange:#F97316;--orange-dark:#EA580C;--charcoal:#1C1917;--gray:#78716C;--gray-light:#F5F5F4;--gray-mid:#E7E5E4}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--charcoal);color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:32px}
.card{background:#fff;color:var(--charcoal);border-radius:24px;padding:48px;max-width:480px;width:100%;box-shadow:0 32px 64px rgba(0,0,0,.4)}
.icon{font-size:64px;margin-bottom:16px}
h1{font-size:28px;font-weight:900;letter-spacing:-1px;margin-bottom:8px}
p{font-size:16px;color:var(--gray);margin-bottom:28px;line-height:1.6}
.btn{display:block;padding:14px 28px;border-radius:12px;background:var(--orange);color:#fff;font-size:16px;font-weight:700;text-decoration:none;transition:all .15s;margin-bottom:10px}
.btn:hover{background:var(--orange-dark)}
.btn-secondary{display:block;padding:14px 28px;border-radius:12px;border:1.5px solid var(--gray-mid);color:var(--charcoal);font-size:15px;font-weight:600;text-decoration:none;transition:all .15s}
.btn-secondary:hover{background:var(--gray-light)}
.status{font-size:13px;color:var(--gray);margin-top:20px;min-height:20px}
</style>
</head>
<body>
<div class="card">
  <div id="iconEl" class="icon">⏳</div>
  <h1 id="titleEl">Activating your listing...</h1>
  <p id="descEl">Please wait while we activate your food truck listing.</p>
  <div id="actionsEl"></div>
  <div class="status" id="statusEl"></div>
</div>

<script>
const sbClient = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);

async function activate() {
  const params = new URLSearchParams(window.location.search);
  const truckId = params.get('truck_id');

  if (!truckId) { showError('No truck ID found. Please contact support.'); return; }

  const { data: { user } } = await sbClient.auth.getUser();
  if (!user) { showError('Session expired. Please log in and contact support.'); return; }

  const { error } = await sbClient
    .from('trucks')
    .update({ status: 'active', updated_at: new Date().toISOString() })
    .eq('id', truckId)
    .eq('owner_id', user.id);

  if (error) { showError('Could not activate: ' + error.message); return; }

  showSuccess();
}

function showSuccess() {
  document.getElementById('iconEl').textContent = '🎉';
  document.getElementById('titleEl').textContent = "You're LIVE!";
  document.getElementById('descEl').textContent = "Your food truck is now listed on Street Bites USA. Hungry customers can find you right now!";
  document.getElementById('actionsEl').innerHTML = `
    <a href="index.html" class="btn">🚚 See Your Live Listing</a>
    <a href="dash.html" class="btn-secondary">Go to Dashboard</a>
  `;
  document.getElementById('statusEl').textContent = '✅ Payment confirmed · Listing activated';
}

function showError(msg) {
  document.getElementById('iconEl').textContent = '⚠️';
  document.getElementById('titleEl').textContent = 'Almost there!';
  document.getElementById('descEl').textContent = 'Your payment was received but we had trouble activating automatically. Log in to your dashboard to complete setup.';
  document.getElementById('actionsEl').innerHTML = `<a href="dash.html" class="btn">Go to Dashboard</a>`;
  document.getElementById('statusEl').textContent = msg;
}

activate();
</script>
</body>
</html>
