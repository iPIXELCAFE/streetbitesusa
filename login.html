<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Owner Login — Street Bites USA</title>
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--orange:#F97316;--orange-dark:#EA580C;--orange-light:#FED7AA;--cream:#FFFBF5;--charcoal:#1C1917;--gray:#78716C;--gray-light:#F5F5F4;--gray-mid:#E7E5E4;--shadow-lg:0 20px 48px rgba(0,0,0,.14)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--cream);color:var(--charcoal);min-height:100vh;display:flex;flex-direction:column}
nav{background:#fff;border-bottom:1px solid var(--gray-mid);padding:0 32px;display:flex;align-items:center;height:64px}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--charcoal)}
.logo-icon{width:36px;height:36px;background:var(--orange);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
.logo span{font-weight:800;font-size:20px;letter-spacing:-.5px}
.logo em{color:var(--orange);font-style:normal}
.center{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px}
.login-card{background:#fff;border-radius:20px;padding:40px;max-width:400px;width:100%;box-shadow:var(--shadow-lg)}
.login-card h1{font-size:24px;font-weight:900;margin-bottom:6px}
.login-card p{font-size:14px;color:var(--gray);margin-bottom:28px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:600;margin-bottom:6px}
.form-group input{width:100%;padding:11px 14px;border-radius:9px;border:1.5px solid var(--gray-mid);font-size:14px;outline:none;transition:border-color .15s;font-family:inherit}
.form-group input:focus{border-color:var(--orange)}
.btn-login{width:100%;padding:14px;border-radius:12px;background:var(--orange);color:#fff;font-size:16px;font-weight:700;border:none;cursor:pointer;transition:all .15s;margin-top:8px}
.btn-login:hover{background:var(--orange-dark)}
.btn-login:disabled{background:var(--gray-mid);color:var(--gray);cursor:not-allowed}
.error-msg{background:#FEF2F2;border:1px solid #FCA5A5;color:#DC2626;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none}
.links{text-align:center;margin-top:20px;font-size:14px;color:var(--gray)}
.links a{color:var(--orange);text-decoration:none;font-weight:600}
</style>
</head>
<body>

<nav>
  <a class="logo" href="index.html">
    <div class="logo-icon">🚚</div>
    <span>Street Bites<em>USA</em></span>
  </a>
</nav>

<div class="center">
  <div class="login-card">
    <h1>Owner Login 🔑</h1>
    <p>Log in to manage your food truck listing.</p>
    <div id="errMsg" class="error-msg"></div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="jane@mytruck.com" onkeydown="if(event.key==='Enter')login()" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Your password" onkeydown="if(event.key==='Enter')login()" />
    </div>
    <button class="btn-login" id="loginBtn" onclick="login()">Log In →</button>
    <div class="links">
      <p>Don't have an account? <a href="signup.html">List your truck</a></p>
    </div>
  </div>
</div>

<script>
const supabase = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);

// If already logged in, redirect
supabase.auth.getSession().then(({ data }) => {
  if (data.session) window.location = 'dash.html';
});

async function login() {
  const email = document.getElementById('email').value.trim();
  const pw = document.getElementById('password').value;
  const err = document.getElementById('errMsg');
  const btn = document.getElementById('loginBtn');

  err.style.display = 'none';
  if (!email || !pw) { err.textContent = 'Please fill in all fields.'; err.style.display = 'block'; return; }

  btn.disabled = true; btn.textContent = 'Logging in...';
  const { error } = await supabase.auth.signInWithPassword({ email, password: pw });
  btn.disabled = false; btn.textContent = 'Log In →';

  if (error) { err.textContent = error.message; err.style.display = 'block'; return; }
  window.location = 'dash.html';
}
</script>
</body>
</html>
